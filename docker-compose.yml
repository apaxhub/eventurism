version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval '
        try {
          if (rs.status().ok) quit(0);
        } catch(e) {
          if (rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]}).ok) quit(0);
        }
        quit(1);
        '
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: